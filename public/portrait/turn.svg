<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="96" height="64" shape-rendering="crispEdges">
  <!-- ============================================================
       turn.svg — 2-frame pivot bridging the profile walk to the
       front idle. Frame 0 = 3/4 view (face turning toward viewer,
       one eye visible + a hint of the second). Frame 1 = near-front
       (both eye sockets, centered). Legs planted together (the walk
       has stopped). Palette matches idle.svg / walk.svg.
       Eyes baked as light sockets — pupils overlaid by component
       on the idle phase only; the turn frames carry their own dark
       eye dots so the pivot still reads as "looking".
       ============================================================ -->

  <!-- ==== Frame 0 : 3/4 view ==== -->
  <g transform="translate(0,0)">
    <!-- hair (offset toward the turning side) -->
    <rect x="17" y="6"  width="15" height="3" fill="#1c1814"/>
    <rect x="16" y="9"  width="17" height="3" fill="#1c1814"/>
    <rect x="16" y="12" width="2"  height="8" fill="#1c1814"/>
    <rect x="31" y="12" width="2"  height="7" fill="#1c1814"/>
    <!-- face -->
    <rect x="18" y="12" width="14" height="12" fill="#c99a6e"/>
    <rect x="19" y="22" width="12" height="2"  fill="#a17a52"/>
    <!-- brows -->
    <rect x="19" y="15" width="4"  height="1"  fill="#1c1814"/>
    <rect x="27" y="15" width="3"  height="1"  fill="#1c1814"/>
    <!-- eyes: near eye full, far eye a sliver (3/4) -->
    <rect x="19" y="16" width="4"  height="3"  fill="#e3d4b0"/>
    <rect x="20" y="16" width="2"  height="2"  fill="#1c1814"/>
    <rect x="28" y="16" width="2"  height="3"  fill="#e3d4b0"/>
    <rect x="28" y="16" width="1"  height="2"  fill="#1c1814"/>
    <!-- nose (toward near side) + mouth -->
    <rect x="24" y="19" width="2"  height="3"  fill="#a17a52"/>
    <rect x="21" y="22" width="6"  height="1"  fill="#6d3a2a"/>
    <!-- neck -->
    <rect x="22" y="24" width="6"  height="2"  fill="#c99a6e"/>
    <rect x="22" y="25" width="6"  height="1"  fill="#a17a52"/>
    <!-- shirt (slightly angled torso) -->
    <rect x="15" y="26" width="19" height="3"  fill="#d64933"/>
    <rect x="17" y="29" width="16" height="13" fill="#d64933"/>
    <rect x="17" y="29" width="3"  height="13" fill="#b23a27"/>
    <!-- arms -->
    <rect x="13" y="27" width="3"  height="12" fill="#d64933"/>
    <rect x="13" y="39" width="3"  height="3"  fill="#c99a6e"/>
    <rect x="33" y="27" width="3"  height="12" fill="#d64933"/>
    <rect x="33" y="39" width="3"  height="3"  fill="#c99a6e"/>
    <!-- legs together (planted) -->
    <rect x="17" y="42" width="15" height="2"  fill="#2a251d"/>
    <rect x="18" y="44" width="6"  height="13" fill="#3a342a"/>
    <rect x="25" y="44" width="6"  height="13" fill="#3a342a"/>
    <rect x="18" y="44" width="2"  height="13" fill="#2a251d"/>
    <rect x="17" y="57" width="7"  height="3"  fill="#1c1814"/>
    <rect x="25" y="57" width="7"  height="3"  fill="#1c1814"/>
  </g>

  <!-- ==== Frame 1 : near-front ==== -->
  <g transform="translate(48,0)">
    <!-- hair (front, centered) -->
    <rect x="16" y="6"  width="16" height="3" fill="#1c1814"/>
    <rect x="15" y="9"  width="18" height="3" fill="#1c1814"/>
    <rect x="15" y="12" width="2"  height="8" fill="#1c1814"/>
    <rect x="31" y="12" width="2"  height="8" fill="#1c1814"/>
    <!-- face -->
    <rect x="17" y="12" width="14" height="12" fill="#c99a6e"/>
    <rect x="18" y="22" width="12" height="2"  fill="#a17a52"/>
    <!-- brows -->
    <rect x="18" y="15" width="4"  height="1"  fill="#1c1814"/>
    <rect x="26" y="15" width="4"  height="1"  fill="#1c1814"/>
    <!-- eyes: both visible, centered pupils -->
    <rect x="18" y="16" width="4"  height="3"  fill="#e3d4b0"/>
    <rect x="19" y="16" width="2"  height="2"  fill="#1c1814"/>
    <rect x="26" y="16" width="4"  height="3"  fill="#e3d4b0"/>
    <rect x="27" y="16" width="2"  height="2"  fill="#1c1814"/>
    <!-- nose + mouth -->
    <rect x="23" y="19" width="2"  height="3"  fill="#a17a52"/>
    <rect x="21" y="22" width="6"  height="1"  fill="#6d3a2a"/>
    <!-- neck -->
    <rect x="21" y="24" width="6"  height="2"  fill="#c99a6e"/>
    <rect x="21" y="25" width="6"  height="1"  fill="#a17a52"/>
    <!-- shirt (front) -->
    <rect x="14" y="26" width="20" height="3"  fill="#d64933"/>
    <rect x="16" y="29" width="16" height="13" fill="#d64933"/>
    <rect x="16" y="29" width="3"  height="13" fill="#b23a27"/>
    <rect x="22" y="26" width="4"  height="2"  fill="#b23a27"/>
    <!-- arms -->
    <rect x="12" y="27" width="3"  height="12" fill="#d64933"/>
    <rect x="12" y="39" width="3"  height="3"  fill="#c99a6e"/>
    <rect x="33" y="27" width="3"  height="12" fill="#d64933"/>
    <rect x="33" y="39" width="3"  height="3"  fill="#c99a6e"/>
    <!-- legs together -->
    <rect x="16" y="42" width="16" height="2"  fill="#2a251d"/>
    <rect x="17" y="44" width="6"  height="13" fill="#3a342a"/>
    <rect x="25" y="44" width="6"  height="13" fill="#3a342a"/>
    <rect x="17" y="44" width="2"  height="13" fill="#2a251d"/>
    <rect x="25" y="44" width="2"  height="13" fill="#2a251d"/>
    <rect x="16" y="57" width="7"  height="3"  fill="#1c1814"/>
    <rect x="25" y="57" width="7"  height="3"  fill="#1c1814"/>
  </g>
</svg>
